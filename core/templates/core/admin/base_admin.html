<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Command Center{% endblock %} — AFT</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&family=Rajdhani:wght@400;500;600&family=Share+Tech+Mono&display=swap');
:root{
  --black:#080808;--black2:#0d0d0d;--black3:#111;--black4:#161616;
  --gray-line:#2a2a2a;--gray-muted:#555;--gray-text:#888;
  --white:#f0f0f0;--wdim:#ccc;--red:#cc0000;--red-b:#e60000;
  --fd:'Orbitron',monospace;--fb:'Rajdhani',sans-serif;--fm:'Share Tech Mono',monospace;
  --nav:56px;--side:220px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--fb);background:var(--black);color:var(--wdim);font-size:14px;line-height:1.6}
::selection{background:var(--red);color:#fff}
a{color:inherit;text-decoration:none}
input,textarea,select,button{font-family:inherit}

/* Topbar */
.topbar{position:fixed;top:0;left:0;right:0;height:var(--nav);background:var(--black2);
  border-bottom:1px solid var(--gray-line);z-index:100;display:flex;align-items:center;padding:0 24px;gap:16px}
.topbar-logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar-tri{width:26px;height:26px;background:var(--red);clip-path:polygon(50% 0%,100% 100%,0% 100%)}
.topbar-name{font-family:var(--fd);font-size:.6rem;font-weight:700;color:#fff;letter-spacing:.14em;text-transform:uppercase;line-height:1.2}
.topbar-name span{display:block;font-size:.44rem;font-weight:400;color:var(--gray-text);letter-spacing:.28em}
.topbar-tag{font-family:var(--fm);font-size:.5rem;color:var(--red);letter-spacing:.3em;text-transform:uppercase;margin-left:8px;padding:3px 8px;border:1px solid rgba(204,0,0,.3)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:16px}
.topbar-user{font-family:var(--fm);font-size:.52rem;color:var(--gray-text);letter-spacing:.1em}
.topbar-user strong{color:var(--red)}
.topbar-logout{font-family:var(--fd);font-size:.44rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;
  color:var(--gray-text);padding:6px 12px;border:1px solid var(--gray-line);
  transition:border-color .3s,color .3s}
.topbar-logout:hover{border-color:var(--red);color:var(--red)}

/* Sidebar */
.sidebar{position:fixed;top:var(--nav);left:0;bottom:0;width:var(--side);
  background:var(--black2);border-right:1px solid var(--gray-line);
  display:flex;flex-direction:column;z-index:90;overflow-y:auto}
.sidebar-section{padding:20px 0 8px;border-bottom:1px solid var(--gray-line)}
.sidebar-section:last-child{border-bottom:none}
.sidebar-label{font-family:var(--fm);font-size:.46rem;color:var(--gray-muted);letter-spacing:.32em;text-transform:uppercase;padding:0 18px 10px}
.sidebar-link{display:flex;align-items:center;gap:10px;padding:10px 18px;
  font-family:var(--fd);font-size:.48rem;font-weight:500;letter-spacing:.14em;text-transform:uppercase;
  color:var(--gray-text);transition:background .25s,color .25s;position:relative}
.sidebar-link:hover,.sidebar-link.active{color:#fff;background:rgba(204,0,0,.07)}
.sidebar-link.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red)}
.sidebar-link-icon{width:16px;height:16px;flex-shrink:0;opacity:.6}
.sidebar-link:hover .sidebar-link-icon,.sidebar-link.active .sidebar-link-icon{opacity:1}

/* Main */
.main{margin-left:var(--side);margin-top:var(--nav);min-height:calc(100vh - var(--nav));padding:32px 36px}

/* Page header */
.page-header{margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--gray-line)}
.page-header-label{font-family:var(--fm);font-size:.5rem;color:var(--red);letter-spacing:.36em;text-transform:uppercase;margin-bottom:8px}
.page-header-title{font-family:var(--fd);font-size:1.3rem;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.05em}
.page-header-sub{font-size:.85rem;color:var(--gray-text);margin-top:4px}

/* Cards */
.card{background:var(--black2);border:1px solid var(--gray-line);padding:24px;margin-bottom:20px}
.card-title{font-family:var(--fd);font-size:.6rem;font-weight:600;color:#fff;letter-spacing:.14em;text-transform:uppercase;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--gray-line)}

/* Grid */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}

/* Stat cards */
.stat-card{background:var(--black3);border:1px solid var(--gray-line);padding:20px 22px;position:relative;overflow:hidden;transition:border-color .3s}
.stat-card:hover{border-color:var(--red)}
.stat-card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--red)}
.stat-num{font-family:var(--fd);font-size:1.8rem;font-weight:800;color:#fff;line-height:1;margin-bottom:4px}
.stat-label{font-family:var(--fm);font-size:.48rem;color:var(--gray-text);letter-spacing:.2em;text-transform:uppercase}

/* Table */
.data-table{width:100%;border-collapse:collapse}
.data-table th{font-family:var(--fm);font-size:.46rem;color:var(--gray-text);letter-spacing:.24em;text-transform:uppercase;
  padding:10px 14px;border-bottom:1px solid var(--gray-line);text-align:left;background:rgba(0,0,0,.2)}
.data-table td{padding:12px 14px;border-bottom:1px solid rgba(42,42,42,.5);font-size:.88rem;color:var(--wdim);vertical-align:middle}
.data-table tr:hover td{background:rgba(255,255,255,.02)}

/* Status badges */
.badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--fm);font-size:.44rem;letter-spacing:.2em;text-transform:uppercase;padding:3px 8px;border:1px solid}
.badge-op{color:#00cc44;border-color:rgba(0,204,68,.3);background:rgba(0,204,68,.05)}
.badge-dev{color:#ffaa00;border-color:rgba(255,170,0,.3);background:rgba(255,170,0,.05)}
.badge-pro{color:var(--gray-text);border-color:var(--gray-line)}
.badge-dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--fd);font-size:.48rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;padding:9px 18px;border:1px solid;transition:.3s;cursor:pointer}
.btn-primary{background:var(--red);color:#fff;border-color:var(--red)}
.btn-primary:hover{background:var(--red-b);box-shadow:0 0 20px rgba(204,0,0,.3)}
.btn-outline{background:transparent;color:var(--wdim);border-color:var(--gray-line)}
.btn-outline:hover{border-color:var(--red);color:var(--red)}
.btn-sm{padding:6px 12px;font-size:.44rem}
.btn-danger{background:transparent;color:#ff4444;border-color:rgba(255,68,68,.3)}
.btn-danger:hover{background:rgba(255,68,68,.1)}

/* Forms */
.form-group{margin-bottom:18px}
.form-label{display:block;font-family:var(--fm);font-size:.48rem;color:var(--gray-text);letter-spacing:.26em;text-transform:uppercase;margin-bottom:7px}
.form-control{width:100%;background:var(--black3);border:1px solid var(--gray-line);color:#fff;
  font-family:var(--fb);font-size:.9rem;padding:10px 13px;outline:none;
  transition:border-color .3s,box-shadow .3s;border-radius:0;appearance:none;-webkit-appearance:none}
.form-control:focus{border-color:var(--red);box-shadow:0 0 0 2px rgba(204,0,0,.12)}
.form-control::placeholder{color:var(--gray-muted)}
.form-control option{background:var(--black3)}
textarea.form-control{resize:vertical;min-height:90px}
.form-hint{font-family:var(--fm);font-size:.46rem;color:var(--gray-muted);letter-spacing:.1em;margin-top:4px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* Alert */
.alert{padding:12px 16px;border:1px solid;margin-bottom:20px;font-size:.88rem;display:flex;align-items:center;gap:10px}
.alert-success{color:#00cc44;border-color:rgba(0,204,68,.3);background:rgba(0,204,68,.05)}
.alert-error{color:#ff4444;border-color:rgba(255,68,68,.3);background:rgba(255,68,68,.05)}

/* Specs grid */
.specs-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.spec-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* Mobile sidebar toggle */
.sidebar-toggle{display:none;background:none;border:none;cursor:pointer;padding:8px;color:#fff}

@media(max-width:900px){
  .sidebar{transform:translateX(-100%);transition:transform .3s}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .grid-2,.grid-3{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .sidebar-toggle{display:flex;align-items:center;justify-content:center}
}
</style>
</head>
<body>

<div class="topbar">
  <button class="sidebar-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="2" y1="5" x2="18" y2="5"/><line x1="2" y1="10" x2="18" y2="10"/><line x1="2" y1="15" x2="18" y2="15"/></svg>
  </button>
  <div class="topbar-logo">
    <div class="topbar-tri"></div>
    <div class="topbar-name">AFalconeri<span>Technologies</span></div>
  </div>
  <div class="topbar-tag">Command Center</div>
  <div class="topbar-right">
    <div class="topbar-user">Logged in as <strong>{{ request.user.username|upper }}</strong></div>
    <a href="{% url 'core:admin_logout' %}" class="topbar-logout">Logout →</a>
  </div>
</div>

<nav class="sidebar">
  <div class="sidebar-section">
    <div class="sidebar-label">Navigation</div>
    <a href="{% url 'core:admin_dashboard' %}" class="sidebar-link {% block nav_dash %}{% endblock %}">
      <svg class="sidebar-link-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1" width="6" height="6"/><rect x="9" y="1" width="6" height="6"/><rect x="1" y="9" width="6" height="6"/><rect x="9" y="9" width="6" height="6"/></svg>
      Dashboard
    </a>
    <a href="{% url 'core:admin_systems' %}" class="sidebar-link {% block nav_sys %}{% endblock %}">
      <svg class="sidebar-link-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M8 2l6 10H2z"/><circle cx="8" cy="12" r="2"/></svg>
      Drone Systems
    </a>
    <a href="{% url 'core:admin_capabilities' %}" class="sidebar-link {% block nav_cap %}{% endblock %}">
      <svg class="sidebar-link-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="4" width="14" height="2"/><rect x="1" y="8" width="10" height="2"/><rect x="1" y="12" width="12" height="2"/></svg>
      Capabilities
    </a>
    <a href="{% url 'core:admin_contact' %}" class="sidebar-link {% block nav_con %}{% endblock %}">
      <svg class="sidebar-link-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="3" width="14" height="10" rx="1"/><path d="M1 5l7 5 7-5"/></svg>
      Contact Info
    </a>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">Site</div>
    <a href="{% url 'core:home' %}" target="_blank" class="sidebar-link">
      <svg class="sidebar-link-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M8 1L1 7h2v7h10V7h2z"/></svg>
      View Website ↗
    </a>
  </div>
</nav>

<main class="main">
  {% if messages %}
    {% for message in messages %}
    <div class="alert alert-success">✓ {{ message }}</div>
    {% endfor %}
  {% endif %}
  {% block content %}{% endblock %}
</main>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Command Center — AFalconeri Technologies</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&family=Rajdhani:wght@400;500;600&family=Share+Tech+Mono&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Rajdhani',sans-serif;background:#080808;color:#ccc;}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),
  linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);
  background-size:56px 56px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;top:0;left:0;right:0;height:3px;background:#cc0000;box-shadow:0 0 20px rgba(204,0,0,.5);z-index:10}
.scan{position:fixed;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(204,0,0,.35),transparent);animation:scan 8s linear infinite;pointer-events:none;z-index:5}
@keyframes scan{0%{top:0}100%{top:100%}}
.corner-tl,.corner-tr{position:fixed;top:20px;width:16px;height:16px;border-color:#cc0000;border-style:solid;opacity:.4;z-index:5}
.corner-tl{left:20px;border-width:2px 0 0 2px}
.corner-tr{right:20px;border-width:2px 2px 0 0}
.wrap{position:relative;z-index:1;width:100%;max-width:400px;padding:20px}
.logo{display:flex;align-items:center;gap:14px;margin-bottom:36px;justify-content:center}
.logo-tri{width:36px;height:36px;background:#cc0000;clip-path:polygon(50% 0%,100% 100%,0% 100%);flex-shrink:0}
.logo-text{font-family:'Orbitron',monospace;font-weight:700;font-size:.75rem;color:#f0f0f0;letter-spacing:.15em;text-transform:uppercase;line-height:1.2}
.logo-text span{display:block;font-size:.46rem;font-weight:400;color:#666;letter-spacing:.32em}
.box{background:#0d0d0d;border:1px solid #2a2a2a;padding:32px}
.box-label{font-family:'Share Tech Mono',monospace;font-size:.5rem;color:#cc0000;letter-spacing:.4em;text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.box-label::before{content:'';display:block;width:20px;height:1px;background:#cc0000}
.box-title{font-family:'Orbitron',monospace;font-size:1rem;font-weight:700;color:#f0f0f0;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.box-sub{font-size:.82rem;color:#666;margin-bottom:28px}
.form-label{display:block;font-family:'Share Tech Mono',monospace;font-size:.48rem;color:#888;letter-spacing:.28em;text-transform:uppercase;margin-bottom:6px}
.form-control{width:100%;background:#111;border:1px solid #2a2a2a;color:#f0f0f0;font-family:'Rajdhani',sans-serif;font-size:.95rem;padding:11px 14px;outline:none;transition:border-color .3s,box-shadow .3s;border-radius:0;appearance:none;-webkit-appearance:none;margin-bottom:16px}
.form-control:focus{border-color:#cc0000;box-shadow:0 0 0 2px rgba(204,0,0,.12)}
.form-control::placeholder{color:#444}
.btn-submit{width:100%;background:#cc0000;color:#fff;border:1px solid #cc0000;padding:13px;font-family:'Orbitron',monospace;font-size:.52rem;font-weight:700;letter-spacing:.28em;text-transform:uppercase;cursor:pointer;transition:background .3s,box-shadow .3s;margin-top:4px}
.btn-submit:hover{background:#e60000;box-shadow:0 0 28px rgba(204,0,0,.4)}
.error{padding:10px 14px;border:1px solid rgba(255,68,68,.4);background:rgba(255,68,68,.06);color:#ff6666;margin-bottom:18px;font-family:'Share Tech Mono',monospace;font-size:.52rem;letter-spacing:.06em}
.corner{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);font-family:'Share Tech Mono',monospace;font-size:.44rem;color:#2a2a2a;letter-spacing:.2em;text-transform:uppercase;white-space:nowrap}
</style>
</head>
<body>
<div class="scan"></div>
<div class="corner-tl"></div>
<div class="corner-tr"></div>
<div class="wrap">
  <div class="logo">
    <div class="logo-tri"></div>
    <div class="logo-text">AFalconeri<span>Technologies</span></div>
  </div>
  <div class="box">
    <div class="box-label">Restricted Access</div>
    <div class="box-title">Command Center</div>
    <div class="box-sub">Authentication required. Authorized personnel only.</div>
    {% if error %}<div class="error">&#9888; {{ error }}</div>{% endif %}
    <form method="post">
      {% csrf_token %}
      <label class="form-label">Username</label>
      <input type="text" name="username" class="form-control" placeholder="Enter username" autocomplete="username" autofocus>
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" placeholder="Enter password" autocomplete="current-password">
      <button type="submit" class="btn-submit">Authenticate &rarr;</button>
    </form>
  </div>
</div>
<div class="corner">AFALCONERI TECHNOLOGIES // COMMAND CENTER // RESTRICTED</div>
</body>
</html>
